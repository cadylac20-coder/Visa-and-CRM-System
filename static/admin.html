<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKOV Visa CRM — Internal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--surface3:#2a2f45;
  --border:#2e3350;--border2:#3d4466;
  --navy:#1e3a5f;--teal:#00c6b8;--teal-dim:#00857a;
  --gold:#f5b731;--red:#e05454;--green:#3ecf8e;--blue:#4f8ef7;
  --text:#e8eaf0;--text2:#9aa3c2;--text3:#5c6485;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── Sidebar ── */
.logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{font-size:18px;font-weight:700;color:var(--teal);letter-spacing:-0.5px}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.nav{padding:12px 8px;flex:1}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(0,198,184,0.12);color:var(--teal)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.8}
.nav-item.active svg{opacity:1}
.badge{margin-left:auto;background:var(--teal);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r);background:var(--surface2)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--teal));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.user-name{font-size:12px;font-weight:500}
.user-role{font-size:10px;color:var(--text3)}

/* ── Topbar ── */
.page-title{font-size:16px;font-weight:600}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.search-wrap{position:relative}
.search-wrap input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:7px 12px 7px 32px;color:var(--text);font-size:13px;width:240px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--teal)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:14px;height:14px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--font)}
.btn-primary{background:var(--teal);color:#000}
.btn-primary:hover{background:#00e0cf}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-danger{background:rgba(224,84,84,0.15);color:var(--red);border:1px solid rgba(224,84,84,0.3)}
.btn-danger:hover{background:rgba(224,84,84,0.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--text2);display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{background:var(--surface3);color:var(--text)}
.btn svg{width:14px;height:14px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px}

/* ── Stats row ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1}
.stat-label{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500}
.stat-delta{font-size:11px;margin-top:8px}
.stat-delta.up{color:var(--green)}
.stat-delta.down{color:var(--red)}

/* ── Table ── */
.table-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--surface2)}
.clickable{cursor:pointer}

/* ── Status badges ── */
.status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.status::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-pending{background:rgba(245,183,49,0.12);color:var(--gold)}.status-pending::before{background:var(--gold)}
.status-docs_received{background:rgba(79,142,247,0.12);color:var(--blue)}.status-docs_received::before{background:var(--blue)}
.status-review{background:rgba(79,142,247,0.12);color:var(--blue)}.status-review::before{background:var(--blue)}
.status-submitted{background:rgba(62,207,142,0.12);color:var(--green)}.status-submitted::before{background:var(--green)}
.status-approved{background:rgba(0,198,184,0.12);color:var(--teal)}.status-approved::before{background:var(--teal)}
.status-rejected{background:rgba(224,84,84,0.12);color:var(--red)}.status-rejected::before{background:var(--red)}

/* ── Progress bar ── */
.progress-wrap{display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;min-width:60px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .3s}
.progress-pct{font-size:11px;color:var(--text3);font-family:var(--mono);min-width:28px}

/* ── Form ── */
.form-grid{display:grid;gap:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal)}
.form-group textarea{min-height:80px;resize:vertical}
.form-group select option{background:var(--surface2)}
.file-drop{border:2px dashed var(--border2);border-radius:var(--r2);padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2)}
.file-drop:hover,.file-drop.dragover{border-color:var(--teal);background:rgba(0,198,184,0.06)}
.file-drop p{font-size:13px;color:var(--text2)}
.file-drop span{font-size:11px;color:var(--text3);margin-top:4px;display:block}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--text)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);width:90%;max-width:580px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:4px;border-radius:4px}
.modal-close:hover{color:var(--text);background:var(--surface2)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── Views ── */
.view{display:none}
.view.active{display:block}

/* ── Page sections ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-header h2{font-size:20px;font-weight:600}
.page-header p{font-size:13px;color:var(--text3);margin-top:2px}

/* ── Checklist editor ── */
.checklist-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.checklist-item input[type=text]{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;outline:none}
.checklist-item input[type=text]::placeholder{color:var(--text3)}
.drag-handle{color:var(--text3);cursor:grab;font-size:16px;line-height:1}
.remove-item{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:2px;border-radius:4px}
.remove-item:hover{color:var(--red)}

/* ── Document viewer ── */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.doc-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.doc-card:hover{border-color:var(--teal)}
.doc-card.verified{border-color:rgba(62,207,142,0.4);background:rgba(62,207,142,0.05)}
.doc-card.missing{border-color:rgba(224,84,84,0.3);background:rgba(224,84,84,0.04)}
.doc-icon{font-size:28px;margin-bottom:8px;display:block}
.doc-name{font-size:11px;font-weight:500;color:var(--text2)}
.doc-status{font-size:10px;color:var(--text3);margin-top:4px}
.doc-date{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.3}
.doc-badge{position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
.doc-badge.verified{background:var(--green);color:#000}
.doc-badge.missing{background:var(--red);color:white}
.doc-badge.uploaded{background:var(--blue);color:white}

/* ── Activity log ── */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:5px}
.activity-content{flex:1}
.activity-action{font-size:13px;font-weight:500}
.activity-detail{font-size:12px;color:var(--text3);margin-top:2px}
.activity-time{font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0}

/* ── VFS page ── */
.vfs-split{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.parsed-text{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-size:12px;font-family:var(--mono);color:var(--text2);min-height:200px;max-height:300px;overflow-y:auto;white-space:pre-wrap;line-height:1.6}

/* ── Packages ── */
.packages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.package-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:all .15s}
.package-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.package-header{background:linear-gradient(135deg,var(--navy),#2d4a7a);padding:16px;position:relative}
.package-flag{font-size:28px;margin-bottom:4px}
.package-name{font-size:15px;font-weight:700;color:white}
.package-type{font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.5px}
.package-body{padding:16px}
.package-price{font-size:22px;font-weight:700;color:var(--teal);margin-bottom:12px}
.package-price span{font-size:13px;color:var(--text3);font-weight:400}
.package-docs{list-style:none;margin-bottom:14px}
.package-docs li{font-size:12px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.package-docs li::before{content:'•';color:var(--teal);font-size:16px;line-height:1}
.package-actions{display:flex;gap:8px}

/* ── Send message ── */
.channel-toggle{display:flex;gap:8px;margin:12px 0}
.channel-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:transparent;color:var(--text3);transition:all .15s;font-family:var(--font)}
.channel-btn.active.wa{border-color:#25d366;color:#25d366;background:rgba(37,211,102,0.1)}
.channel-btn.active.sms{border-color:var(--blue);color:var(--blue);background:rgba(79,142,247,0.1)}
.channel-btn.active.email{border-color:var(--gold);color:var(--gold);background:rgba(245,183,49,0.1)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 18px;font-size:13px;box-shadow:var(--shadow);z-index:200;transform:translateY(80px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:10px;min-width:260px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{border-color:var(--green);background:rgba(62,207,142,0.1)}
#toast.error{border-color:var(--red);background:rgba(224,84,84,0.1)}

/* ── Login ── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:40px;width:380px;box-shadow:var(--shadow)}
.login-logo{font-size:24px;font-weight:700;color:var(--teal);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.login-error{background:rgba(224,84,84,0.1);border:1px solid rgba(224,84,84,0.3);color:var(--red);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;display:none}

/* ── Comm log ── */
.comm-item{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--surface2);border-radius:var(--r);margin-bottom:8px}
.comm-channel{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.comm-channel.wa{background:rgba(37,211,102,0.15)}
.comm-channel.email{background:rgba(245,183,49,0.15)}
.comm-channel.sms{background:rgba(79,142,247,0.15)}
.comm-body{flex:1}
.comm-title{font-size:13px;font-weight:500}
.comm-time{font-size:11px;color:var(--text3);font-family:var(--mono)}
.comm-status{font-size:11px;padding:2px 8px;border-radius:10px;margin-left:auto;flex-shrink:0}
.comm-status.sent{background:rgba(62,207,142,0.12);color:var(--green)}
.comm-status.failed{background:rgba(224,84,84,0.12);color:var(--red)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{display:none}
  .vfs-split{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">MKOV Visa CRM</div>
    <div class="login-sub">Internal staff access only</div>
    <div id="login-error" class="login-error">Invalid credentials</div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@uniglobemkov.in" value="admin@uniglobemkov.in">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Password" value="admin123" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">MKOV CRM</div>
      <div class="logo-sub">Visa Automation</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Main</div>
      <button class="nav-item active" onclick="nav('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-item" onclick="nav('applications')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        Applications
        <span class="badge" id="nav-pending-count">0</span>
      </button>
      <button class="nav-item" onclick="nav('clients')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clients
      </button>
      <div class="nav-section">Tools</div>
      <button class="nav-item" onclick="nav('vfs')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        VFS Checklists
      </button>
      <button class="nav-item" onclick="nav('packages')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Packages
      </button>
      <button class="nav-item" onclick="nav('messages')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Send Message
      </button>
      <button class="nav-item" onclick="nav('client-profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Client Profile
      </button>
