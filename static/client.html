<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKOV Visa — Track Your Application</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #0F2341;
  --blue:   #1D6FA8;
  --blue2:  #2A8FD4;
  --teal:   #0AB5A4;
  --gold:   #E8A422;
  --red:    #D94040;
  --green:  #2E8B57;
  --white:  #FFFFFF;
  --off:    #F4F8FC;
  --border: #D5E4EE;
  --text:   #1A2B3C;
  --muted:  #6B7F8F;
  --light:  #E8F1F8;
  --shadow: 0 2px 16px rgba(15,35,65,0.10);
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--off); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }

/* Login */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--navy) 0%, #1A3A5C 100%); }
.login-box { background: var(--white); border-radius: 16px; padding: 40px 36px; width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,0.3); }
.login-logo { font-size: 28px; margin-bottom: 4px; }
.login-title { font-size: 20px; font-weight: 700; color: var(--navy); }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; margin-top: 4px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
.field input { width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:8px; font-size:14px; color:var(--text); }
.field input:focus { outline: none; border-color: var(--blue); }
.login-btn { width:100%; padding:12px; background: var(--blue); color: var(--white); border: none; border-radius: 9px; font-size:14px; font-weight:600; cursor:pointer; }
.login-btn:hover { background: var(--blue2); }
.login-hint { font-size:11px; color:var(--muted); text-align:center; margin-top:10px; }
.login-err { background:#FEE2E2; color:var(--red); padding:9px 13px; border-radius:7px; font-size:13px; margin-bottom:14px; display:none; }

/* App layout */
.topbar { background: var(--navy); color: var(--white); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-brand { font-size: 16px; font-weight: 600; }
.topbar-sub { font-size: 11px; opacity: 0.55; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.notif-btn { position:relative; background:rgba(255,255,255,0.1); border:none; border-radius:8px; padding:7px 10px; cursor:pointer; color:var(--white); font-size:16px; }
.notif-dot { position:absolute; top:4px; right:4px; width:8px; height:8px; background:#F59E0B; border-radius:50%; border:1.5px solid var(--navy); }
.logout-link { font-size:12px; color:rgba(255,255,255,0.55); cursor:pointer; }
.logout-link:hover { color:var(--white); }

.content { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

/* Status hero card */
.hero-card { background: linear-gradient(135deg, var(--navy) 0%, #1A3A5C 100%); border-radius: var(--radius); padding: 24px 28px; color: var(--white); margin-bottom: 22px; position: relative; overflow: hidden; }
.hero-card::after { content:''; position:absolute; right:-40px; top:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.04); }
.hero-app-id { font-family: 'JetBrains Mono', monospace; font-size: 13px; opacity: 0.6; margin-bottom: 6px; }
.hero-dest { font-size: 22px; font-weight: 700; margin-bottom: 14px; }
.hero-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 18px; }
.prog-label { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.65; margin-bottom: 5px; }
.prog-track { height: 7px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--teal); border-radius: 4px; transition: width 0.6s; }

/* Grid */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
@media(max-width:720px){ .two-col { grid-template-columns: 1fr; } }

/* Card */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 18px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* Info rows */
.info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-key { color: var(--muted); }
.info-val { font-weight: 500; }

/* Timeline */
.timeline { list-style: none; }
.tl { display: flex; gap: 12px; margin-bottom: 16px; position: relative; }
.tl:not(:last-child)::before { content:''; position:absolute; left:14px; top:30px; bottom:-16px; width:1px; background:var(--border); }
.tl-dot { width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; }
.done { background:#D1FAE5; color:var(--green); }
.now  { background:var(--light); color:var(--blue); }
.wait { background:var(--off); color:var(--muted); border:1px solid var(--border); }
.tl-title { font-size:13px; font-weight:500; }
.tl-time  { font-size:11px; color:var(--muted); margin-top:2px; }

/* Documents */
.doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
.doc-card { border: 1px solid var(--border); border-radius: 9px; padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
.doc-card:hover { border-color: var(--blue); transform: translateY(-1px); box-shadow: var(--shadow); }
.doc-icon { font-size: 26px; margin-bottom: 6px; }
.doc-name { font-size: 11.5px; font-weight: 500; margin-bottom: 2px; }
.doc-status-text { font-size: 10px; }
.doc-card.verified .doc-status-text { color: var(--green); }
.doc-card.uploaded .doc-status-text { color: var(--gold); }
.doc-card.missing  .doc-status-text { color: var(--red); }
.doc-card.missing  { border-style: dashed; }

/* Passport viewer */
.passport-view { background: var(--navy); border-radius: 12px; padding: 24px; color: var(--white); font-family: 'JetBrains Mono', monospace; }
.passport-header { font-size: 11px; letter-spacing: 3px; opacity: 0.5; margin-bottom: 4px; }
.passport-title { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin-bottom: 16px; }
.passport-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 12px; }
.passport-field-label { font-size: 9px; letter-spacing: 1.5px; opacity: 0.5; text-transform: uppercase; margin-bottom: 2px; }
.passport-field-val { font-size: 13px; font-weight: 500; }
.passport-mrz { border-top: 1px solid rgba(255,255,255,0.15); margin-top: 16px; padding-top: 12px; font-size: 10px; letter-spacing: 1px; opacity: 0.5; word-break: break-all; }
.passport-secure { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--teal); margin-top: 12px; }

/* Notifications */
.notif-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
.notif-item:last-child { border-bottom: none; }
.notif-unread-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.notif-read-dot { width: 8px; flex-shrink: 0; }
.notif-text { font-size: 13px; line-height: 1.5; }
.notif-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Upload area */
.upload-area { border: 2px dashed var(--border); border-radius: 9px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.15s; }
.upload-area:hover { border-color: var(--blue); background: var(--light); }

/* Modal overlay */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none; align-items:center; justify-content:center; z-index:999; }
.modal-overlay.open { display:flex; }
.modal { background:var(--white); border-radius:14px; padding:28px; width:480px; max-width:92vw; max-height:85vh; overflow-y:auto; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.modal-title { font-size:16px; font-weight:600; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted); padding:0; }

/* Buttons */
.btn { padding:9px 18px; border-radius:8px; border:none; font-size:13px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--blue); color:var(--white); }
.btn-primary:hover { background:var(--blue2); }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-outline:hover { border-color:var(--blue); color:var(--blue); }

.toast-fixed { position:fixed; bottom:20px; right:20px; background:var(--navy); color:var(--white); padding:11px 18px; border-radius:8px; font-size:13px; z-index:9999; display:none; }

/* Badge colors */
.bs-pending   { background:rgba(232,164,34,0.18); color:#92400E; }
.bs-review    { background:rgba(29,111,168,0.15); color:#1D4A7A; }
.bs-submitted { background:rgba(10,181,164,0.15); color:#0F7065; }
.bs-approved  { background:rgba(46,139,87,0.18); color:var(--green); border:1px solid rgba(46,139,87,0.3); }
.bs-rejected  { background:rgba(217,64,64,0.12); color:var(--red); }
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════════════════════ -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">🛂</div>
    <div class="login-title">Track Your Visa</div>
    <div class="login-sub">Uniglobe MKOV Travel — Client Portal</div>
    <div class="login-err" id="login-err">Incorrect email or password.</div>
    <div class="field"><label>Email Address</label><input id="l-email" value="rahul.sharma@email.com" type="email"></div>
    <div class="field"><label>Password</label><input id="l-pass" value="rahul2024" type="password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-hint">Demo: rahul.sharma@email.com / rahul2024</div>
  </div>
</div>

<!-- ══ PORTAL ══════════════════════════════════════════════════════════════ -->
<div id="portal" style="display:none">

  <div class="topbar">
    <div class="topbar-logo">
      <div>
        <div class="topbar-brand">🛂 MKOV Visa Portal</div>
        <div class="topbar-sub">Uniglobe MKOV Travel</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="notif-btn" onclick="openNotifications()" id="notif-btn">
        🔔<span class="notif-dot" id="notif-dot" style="display:none"></span>
      </button>
      <span class="logout-link" onclick="doLogout()">Sign out</span>
    </div>
  </div>

  <div class="content" id="portal-content">
    <!-- filled by JS -->
  </div>
</div>

<!-- ══ PASSPORT MODAL ══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="passport-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🪪 Passport — Secure Copy</div>
      <button class="modal-close" onclick="closeModal('passport-modal')">✕</button>
    </div>
    <div class="passport-view" id="passport-content"></div>
    <div style="margin-top:16px;text-align:center">
      <button class="btn btn-outline" onclick="closeModal('passport-modal')">Close</button>
    </div>
  </div>
</div>

<!-- ══ UPLOAD MODAL ════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="upload-modal-title">Upload Document</div>
      <button class="modal-close" onclick="closeModal('upload-modal')">✕</button>
    </div>
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <div style="font-size:32px;margin-bottom:8px">📎</div>
      <div style="font-weight:500;margin-bottom:4px">Click to select file</div>
      <div style="font-size:12px;color:var(--muted)">PDF, JPG, PNG — max 10MB</div>
      <input type="file" id="file-input" style="display:none" onchange="fileSelected()">
    </div>
    <div id="file-selected" style="margin-top:10px;font-size:13px;color:var(--muted)"></div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="uploadDoc()">Upload</button>
      <button class="btn btn-outline" onclick="closeModal('upload-modal')">Cancel</button>
    </div>
    <div id="upload-result" style="margin-top:10px;font-size:13px"></div>
  </div>
</div>

<!-- ══ NOTIFICATIONS MODAL ════════════════════════════════════════════════ -->
<div class="modal-overlay" id="notif-modal">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <div class="modal-title">🔔 Notifications</div>
      <button class="modal-close" onclick="closeModal('notif-modal');markRead()">✕</button>
    </div>
    <div id="notif-list"></div>
  </div>
</div>

<div class="toast-fixed" id="toast"></div>

<script>
const API = window.location.origin;
let TOKEN = '';
let CLIENT_DATA = null;
let CURRENT_APP = null;
let UPLOAD_DOC_TYPE = '';
let UPLOAD_APP_ID = '';

const STATUS_LABELS = { pending:'Pending Documents', docs_received:'Documents Received', review:'Under Review', submitted:'Submitted to Embassy', approved:'Approved ✓', rejected:'Not Approved' };
const STATUS_BADGE  = { pending:'bs-pending', docs_received:'bs-review', review:'bs-review', submitted:'bs-submitted', approved:'bs-approved', rejected:'bs-rejected' };
const DOC_ICONS     = { passport:'🪪', photo:'📷', bank_statement:'🏦', hotel_booking:'🏨', flight_ticket:'✈️', travel_insurance:'🛡️', invitation_letter:'📬', company_letter:'🏢', admission_letter:'📚', accommodation_proof:'🏠', onward_ticket:'🎫', other:'📄' };

async function api(path, method='GET', body=null) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+TOKEN },
    body: body ? JSON.stringify(body) : null,
  });
  if (!r.ok) { const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail); }
  return r.json();
}

async function doLogin() {
  const email = document.getElementById('l-email').value;
  const pass  = document.getElementById('l-pass').value;
  try {
    const r = await api('/auth/client/login', 'POST', { email, password: pass });
    TOKEN = r.token;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('portal').style.display = 'block';
    await loadDashboard();
  } catch(e) {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  TOKEN = ''; CLIENT_DATA = null;
  document.getElementById('portal').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function loadDashboard() {
  const data = await api('/client/dashboard');
  CLIENT_DATA = data;
  if (data.unread_count > 0) {
    document.getElementById('notif-dot').style.display = 'block';
  }
  if (!data.applications.length) {
    document.getElementById('portal-content').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:48px;margin-bottom:12px">🗂️</div>
        <div style="font-size:16px;font-weight:500;margin-bottom:6px">No applications yet</div>
        <div style="font-size:13px">Contact your MKOV travel agent to start a visa application.</div>
      </div>`;
    return;
  }
  // Load first application
  await loadApplication(data.applications[0].app_id);
}

async function loadApplication(appId) {
  const data = await api(`/client/application/${appId}`);
  CURRENT_APP = data;
  const a = data.application;
  const pct = a.progress || 10;
  const html = `
    <div class="hero-card">
      <div class="hero-app-id">${a.app_id}</div>
      <div class="hero-dest">${a.destination} — ${(a.visa_type||'').charAt(0).toUpperCase()+(a.visa_type||'').slice(1)} Visa</div>
      <span class="hero-badge ${STATUS_BADGE[a.status]||'bs-pending'}">${STATUS_LABELS[a.status]||a.status}</span>
      <div class="prog-label"><span>Application progress</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="two-col">
      <div>
        <div class="card">
          <div class="card-title">📄 Application Details</div>
          ${infoRow('Application ID', a.app_id)}
          ${infoRow('Destination', a.destination)}
          ${infoRow('Visa Type', (a.visa_type||'').charAt(0).toUpperCase()+(a.visa_type||'').slice(1))}
          ${infoRow('Travel Date', a.travel_date || 'To be confirmed')}
          ${infoRow('Applied On', (a.created_at||'').split('T')[0])}
        </div>
        <div class="card">
          <div class="card-title">📁 Your Documents</div>
          <div class="doc-grid">${buildDocGrid(data.documents, a.app_id)}</div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">📍 Application Timeline</div>
          <ul class="timeline">${buildTimeline(data.activity)}</ul>
        </div>
      </div>
    </div>`;
  document.getElementById('portal-content').innerHTML = html;
}

function infoRow(k, v) {
  return `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v||'—'}</span></div>`;
}

function buildDocGrid(docs, appId) {
  return docs.map(d => `
    <div class="doc-card ${d.status}" onclick="handleDocClick('${d.doc_type}','${d.status}','${appId}')">
      <div class="doc-icon">${DOC_ICONS[d.doc_type]||'📄'}</div>
      <div class="doc-name">${(d.doc_type||'').replace(/_/g,' ')}</div>
      <div class="doc-status-text">${d.status==='missing'?'⚠ Required':d.status==='verified'?'✓ Verified':d.status==='uploaded'?'⏳ Uploaded':'—'}</div>
    </div>`).join('');
}

function handleDocClick(docType, status, appId) {
  if (docType === 'passport' && (status === 'verified' || status === 'uploaded')) {
    showPassport();
  } else if (status === 'missing') {
    UPLOAD_DOC_TYPE = docType;
    UPLOAD_APP_ID   = appId;
    document.getElementById('upload-modal-title').textContent = 'Upload: ' + docType.replace(/_/g,' ');
    document.getElementById('upload-result').textContent = '';
    document.getElementById('file-selected').textContent = '';
    openModal('upload-modal');
  } else {
    toast('Document on file — contact MKOV team for a copy');
  }
}

function showPassport() {
  const c = CLIENT_DATA?.client || {};
  document.getElementById('passport-content').innerHTML = `
    <div class="passport-header">REPUBLIC OF INDIA</div>
    <div class="passport-title">PASSPORT</div>
    <div class="passport-grid">
      <div><div class="passport-field-label">Surname</div><div class="passport-field-val">SHARMA</div></div>
      <div><div class="passport-field-label">Given Name</div><div class="passport-field-val">RAHUL</div></div>
      <div><div class="passport-field-label">Nationality</div><div class="passport-field-val">INDIAN</div></div>
      <div><div class="passport-field-label">Date of Birth</div><div class="passport-field-val">15 MAR 1992</div></div>
      <div><div class="passport-field-label">Passport No.</div><div class="passport-field-val">P1234567</div></div>
      <div><div class="passport-field-label">Expiry Date</div><div class="passport-field-val">14 MAR 2032</div></div>
    </div>
    <div class="passport-mrz">
      P&lt;INDSHARMA&lt;&lt;RAHUL&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;<br>
      P12345673IND9203151M3203144&lt;&lt;&lt;&lt;&lt;&lt;&lt;2
    </div>
    <div class="passport-secure">🔒 Encrypted — visible only to you and authorised MKOV staff</div>`;
  openModal('passport-modal');
}

function buildTimeline(activity) {
  return (activity||[]).slice(0,6).map((l,i)=>`
    <li class="tl">
      <div class="tl-dot ${i===0?'now':'done'}">${i===0?'▶':'✓'}</div>
      <div>
        <div class="tl-title">${l.action||''}${l.detail?' — '+l.detail:''}</div>
        <div class="tl-time">${(l.created_at||'').split('T')[0]} · ${l.actor||'system'}</div>
      </div>
    </li>`).join('');
}

function openNotifications() {
  const notifs = CLIENT_DATA?.notifications || [];
  document.getElementById('notif-list').innerHTML = notifs.length === 0
    ? '<div style="text-align:center;color:var(--muted);padding:20px">No notifications</div>'
    : notifs.map(n=>`
        <div class="notif-item">
          <div class="${n.read ? 'notif-read-dot' : 'notif-unread-dot'}"></div>
          <div><div class="notif-text">${n.message}</div><div class="notif-time">${(n.created_at||'').split('T')[0]}</div></div>
        </div>`).join('');
  openModal('notif-modal');
}

async function markRead() {
  await api('/client/notifications/read-all', 'POST').catch(()=>{});
  document.getElementById('notif-dot').style.display = 'none';
}

function fileSelected() {
  const f = document.getElementById('file-input').files[0];
  if (f) document.getElementById('file-selected').textContent = `Selected: ${f.name} (${(f.size/1024).toFixed(0)} KB)`;
}

async function uploadDoc() {
  const file = document.getElementById('file-input').files[0];
  if (!file) { document.getElementById('upload-result').textContent = 'Please select a file first.'; return; }
  const form = new FormData();
  form.append('doc_type', UPLOAD_DOC_TYPE);
  form.append('file', file);
  try {
    const r = await fetch(API + `/client/application/${UPLOAD_APP_ID}/upload`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer '+TOKEN },
      body: form,
    });
    const data = await r.json();
    document.getElementById('upload-result').innerHTML = `<span style="color:var(--green)">✓ Uploaded successfully</span>`;
    toast('Document uploaded — MKOV team will verify it soon');
    setTimeout(()=>{ closeModal('upload-modal'); loadApplication(UPLOAD_APP_ID); }, 1500);
  } catch(e) {
    document.getElementById('upload-result').innerHTML = `<span style="color:var(--red)">Upload failed — try again</span>`;
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>{ el.style.display = 'none'; }, 3500);
}
</script>
</body>
</html>
